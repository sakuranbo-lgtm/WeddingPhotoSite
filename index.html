<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Photo Plan</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- フォトプラン概要 -->
    <section class="section">

        <h2>📖 フォトプラン概要</h2>

        <div class="plan-grid">

            <div class="plan-card">
                <h3>撮影時間</h3>
                <p>約2〜3時間</p>
            </div>

            <div class="plan-card">
                <h3>撮影枚数</h3>
                <p>約200枚</p>
            </div>

            <div class="plan-card">
                <h3>納品方法</h3>
                <p>データ・アルバム</p>
            </div>

            <div class="plan-card">
                <h3>衣装</h3>
                <p>ドレス・タキシード</p>
            </div>

        </div>

    </section>



    <!-- 完成イメージ -->

    <section class="section">

        <h2>🖼️ 完成イメージ</h2>

        <div class="gallery">

            <img src="images/sample1.jpg">

            <img src="images/sample2.jpg">

            <img src="images/sample3.jpg">

        </div>

    </section>



    <!-- おすすめスポット -->

    <section class="section">

    <h2>📍 おすすめ撮影スポット</h2>

    <div class="spot-grid">


        <!-- ビーチ -->

        <div class="spot-card">

            <img
                class="spot-image"
                src="images/test.png"
                data-day="images/test.png"
                data-night="images/test_night.png"
                >

            <div class="spot-body">

                <h3>ビーチ</h3>

                <p>海を背景にした開放感のある撮影スポット</p>

                <div class="card-tabs">

                    <button
                        class="card-tab active"
                        data-time="day"
                    >
                        ☀ 昼
                    </button>

                    <button
                        class="card-tab"
                        data-time="night"
                    >
                        🌙 夜
                    </button>

                </div>

            </div>

        </div>


        <!-- チャペル -->

        <div class="spot-card">

            <img
                class="spot-image"
                src="images/chapel-day.jpg"
                data-day="images/chapel-day.jpg"
                data-night="images/chapel-night.jpg"
                >

            <div class="spot-body">

                <h3>チャペル</h3>

                <p>クラシカルで上品な雰囲気の撮影スポット</p>

                <div class="card-tabs">

                    <button
                        class="card-tab active"
                        data-time="day"
                    >
                        ☀ 昼
                    </button>

                    <button
                        class="card-tab"
                        data-time="night"
                    >
                        🌙 夜
                    </button>

                </div>

            </div>

        </div>


        <!-- ガーデン -->

        <div class="spot-card">

            <img
                class="spot-image"
                src="images/garden-day.jpg"
                data-day="images/garden-day.jpg"
                data-night="images/garden-night.jpg"
                >

            <div class="spot-body">

                <h3>ガーデン</h3>

                <p>自然に囲まれたナチュラルな撮影スポット</p>

                <div class="card-tabs">

                    <button
                        class="card-tab active"
                        data-time="day"
                    >
                        ☀ 昼
                    </button>

                    <button
                        class="card-tab"
                        data-time="night"
                    >
                        🌙 夜
                    </button>

                </div>

            </div>

        </div>


    </div>

</section>
    
</body>

</html>
