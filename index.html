<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Photo Plan</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- フォトプラン概要 -->
    <section class="section">

        <h2>📖 フォトプラン概要</h2>

        <div class="plan-grid">

            <div class="plan-card">
                <h3>撮影時間</h3>
                <p>約2〜3時間</p>
            </div>

            <div class="plan-card">
                <h3>撮影枚数</h3>
                <p>約200枚</p>
            </div>

            <div class="plan-card">
                <h3>納品方法</h3>
                <p>データ・アルバム</p>
            </div>

            <div class="plan-card">
                <h3>衣装</h3>
                <p>ドレス・タキシード</p>
            </div>

        </div>

    </section>



    <!-- 完成イメージ -->

    <section class="section">

        <h2>🖼️ 完成イメージ</h2>

        <div class="gallery">

            <img src="images/sample1.jpg">

            <img src="images/sample2.jpg">

            <img src="images/sample3.jpg">

        </div>

    </section>



    <!-- おすすめスポット -->

    <section class="section">

        <h2>📍 おすすめ撮影スポット</h2>

        <div class="spot-grid">

            <div class="spot-card">

                <img src="images/test.png">

                <div class="spot-body">

                    <h3>ビーチ</h3>

                    <p>夕日が映える人気No.1スポット</p>

                </div>

            </div>

            <div class="spot-card">

                <img src="images/test.png">

                <div class="spot-body">

                    <h3>チャペル</h3>

                    <p>クラシカルな雰囲気が魅力</p>

                </div>

            </div>

            <div class="spot-card">

                <img src="images/test.png">

                <div class="spot-body">

                    <h3>ガーデン</h3>

                    <p>自然に囲まれた開放感あるロケーション</p>

                </div>

            </div>

        </div>

    </section>
    
</body>

</html>
