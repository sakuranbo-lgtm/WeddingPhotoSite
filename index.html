<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Photo Plan</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- フォトプラン概要 -->
    <section class="section">

        <h2>📖 フォトプラン概要</h2>

        <div class="plan-grid">

            <div class="plan-card">
                <h3>撮影時間</h3>
                <p>約2〜3時間</p>
            </div>

            <div class="plan-card">
                <h3>撮影枚数</h3>
                <p>約200枚</p>
            </div>

            <div class="plan-card">
                <h3>納品方法</h3>
                <p>データ・アルバム</p>
            </div>

            <div class="plan-card">
                <h3>衣装</h3>
                <p>ドレス・タキシード</p>
            </div>

        </div>

    </section>



    <!-- 完成イメージ -->

    <section class="section">

        <h2>🖼️ 完成イメージ</h2>

        <div class="gallery">

            <img src="images/test.png">

            <img src="images/sample2.jpg">

            <img src="images/sample3.jpg">

        </div>

    </section>



    <!-- おすすめスポット -->

    <section class="section">

    <h2>📍 おすすめ撮影スポット</h2>

    <div class="spot-grid" id="spot-list">
        <!-- spots.jsのデータから自動生成 -->
    </div>

</section>

<script src="spots.js"></script>
<script src="script.js"></script>

</body>

</html>
