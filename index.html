<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Photo Plan</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- フォトプラン概要 -->
    <section class="section">

        <h2>📖 フォトプラン概要</h2>

        <div class="plan-grid">

            <div class="plan-card">
                <h3>撮影時間</h3>
                <p>約2〜3時間</p>
            </div>

            <div class="plan-card">
                <h3>撮影枚数</h3>
                <p>約200枚</p>
            </div>

            <div class="plan-card">
                <h3>納品方法</h3>
                <p>データ・アルバム</p>
            </div>

            <div class="plan-card">
                <h3>衣装</h3>
                <p>ドレス・タキシード</p>
            </div>

        </div>

    </section>



    <!-- アルバムデザイン -->

    <section class="section">

        <h2>📚 アルバムデザイン</h2>

        <p class="section-description">
            思い出を彩る、おふたりだけの一冊。
        </p>

        <div class="album-list" id="album-list">

            <!-- albums.jsから自動生成 -->

        </div>

    </section>



    <!-- おすすめスポット -->

    <section class="section">

    <h2>📍 おすすめ撮影スポット</h2>

    <div class="spot-grid" id="spot-list">
        <!-- spots.jsのデータから自動生成 -->
    </div>

</section>

<!-- 画像拡大表示用 -->

<div id="image-modal" class="image-modal">

    <button id="modal-close" class="modal-close">
        ×
    </button>

    <img id="modal-image" src="" alt="拡大画像">

</div>

<!-- アルバム詳細モーダル -->

<div id="album-modal" class="album-modal">

    <button id="album-modal-close" class="album-modal-close">
        ×
    </button>

    <div class="album-modal-content">

        <h2 id="album-modal-title"></h2>

        <p id="album-modal-description"></p>

        <div
            id="album-pages"
            class="album-pages"
        >

        </div>

    </div>

</div>

<script src="albums.js"></script>
<script src="spots.js"></script>
<script src="script.js"></script>

</body>

</html>
